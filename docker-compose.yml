services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-analyzer-backend
    environment:
      FLASK_HOST: 0.0.0.0
      FLASK_PORT: 5000
      FLASK_DEBUG: 1
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./auth.db:/app/auth.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: log-analyzer-frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:5000
    depends_on:
      - backend
    ports:
      - "5173:5173"
    restart: unless-stopped
