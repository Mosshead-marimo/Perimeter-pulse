services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-analyzer-backend
    environment:
      FLASK_DEBUG: 0
      PYTHONUNBUFFERED: 1
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./auth.db:/app/auth.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: log-analyzer-frontend
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
