services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: log-analyzer-app
    environment:
      FLASK_DEBUG: 0
      PYTHONUNBUFFERED: 1
      DB_PATH: /app/data/auth.db
      SECRET_KEY: dev-secret-key
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
